<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>{% block title %}栄養管理{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #C8490A;
            --primary-dark: #A83A06;
            --primary-light: #FEF0E7;
            --accent: #4A7A55;
            --accent-light: #E3F2E8;
            --bg: #F6EFE4;
            --bg-card: #FFFBF6;
            --card: #FFFBF6;
            --text: #1E1309;
            --text-sub: #6B5744;
            --border: #E6D9C6;
            --shadow: 0 2px 14px rgba(100,50,0,0.08);
            --shadow-lg: 0 6px 30px rgba(100,50,0,0.14);
            --radius: 20px;
            --radius-sm: 14px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        html {
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body {
            font-family: 'Zen Maru Gothic', -apple-system, BlinkMacSystemFont,
                'Hiragino Maru Gothic ProN', 'Hiragino Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: calc(72px + var(--safe-bottom));
            padding-top: var(--safe-top);
            -webkit-font-smoothing: antialiased;
            font-size: 16px;
            line-height: 1.5;
            min-height: 100vh;
            /* Warm ambient gradient mesh */
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(200,73,10,0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 85%, rgba(74,122,85,0.05) 0%, transparent 55%);
        }

        @media (max-width: 480px) {
            body { font-size: 15px; }
        }

        /* ─── Header ─────────────────────────────── */
        .header {
            background: linear-gradient(130deg, var(--primary-dark) 0%, var(--primary) 55%, #E05E1A 100%);
            color: white;
            padding: 14px 20px 14px;
            padding-top: calc(14px + var(--safe-top));
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(168,58,6,0.35);
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .header h1 {
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: -0.4px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.18);
        }
        .header .subtitle {
            font-size: 11px;
            opacity: 0.88;
            margin-top: 3px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .header-badge {
            font-size: 10px;
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.38);
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        /* ─── Bottom Navigation ──────────────────── */
        .nav-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,251,246,0.9);
            backdrop-filter: blur(14px) saturate(1.5);
            -webkit-backdrop-filter: blur(14px) saturate(1.5);
            display: flex;
            border-top: 1px solid var(--border);
            z-index: 100;
            padding-bottom: calc(8px + var(--safe-bottom));
            padding-top: 8px;
            padding-left: 6px;
            padding-right: 6px;
            box-shadow: 0 -2px 20px rgba(100,50,0,0.09);
        }
        .nav-bottom a {
            flex: 1;
            text-align: center;
            padding: 7px 4px 6px;
            text-decoration: none;
            color: var(--text-sub);
            font-size: 10px;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            min-height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            border-radius: 14px;
            margin: 0 2px;
        }
        .nav-bottom a.active {
            color: var(--primary);
            font-weight: 700;
            background: var(--primary-light);
        }
        .nav-bottom a .icon {
            font-size: 22px;
            display: block;
            margin-bottom: 3px;
            transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .nav-bottom a.active .icon {
            transform: scale(1.15) translateY(-1px);
        }

        /* ─── Layout ─────────────────────────────── */
        .container {
            padding: 18px 20px 28px;
            max-width: 560px;
            margin: 0 auto;
        }
        @media (max-width: 360px) {
            .container { padding: 12px 14px 20px; }
        }

        /* ─── Card ───────────────────────────────── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid var(--border);
        }
        .card:active { transform: scale(0.985); box-shadow: var(--shadow-lg); }
        @media (hover: hover) {
            .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        }

        /* ─── Typography helpers ─────────────────── */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            padding: 18px 0 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .app-rev {
            text-align: right;
            font-size: 10px;
            color: var(--text-sub);
            opacity: 0.6;
            margin-top: 6px;
        }

        /* ─── Badges ─────────────────────────────── */
        .badge {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
        }
        .badge-green { background: var(--accent-light); color: #2A5C38; }
        .badge-orange { background: var(--primary-light); color: var(--primary-dark); }
        .badge-blue { background: #EEF2FF; color: #2B4EC0; }

        /* ─── Buttons ────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 22px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #D95F1A);
            color: white;
            box-shadow: 0 3px 12px rgba(200,73,10,0.3);
        }
        .btn-primary:active {
            background: var(--primary-dark);
            transform: scale(0.97);
            box-shadow: none;
        }
        .btn-outline {
            background: var(--card);
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:active {
            background: var(--primary-light);
            transform: scale(0.97);
        }

        /* ─── Tags ───────────────────────────────── */
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin: 2px 3px 2px 0;
            font-weight: 600;
        }

        /* ─── Animations ─────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.94); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .animate-in {
            animation: fadeUp 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
        }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row">
            <div>
                <h1>{% block header_title %}🥗 栄養管理{% endblock %}</h1>
                <div class="subtitle">{% block header_subtitle %}{% endblock %}</div>
            </div>
            <div class="header-badge">ver: {{ app_rev }}</div>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <nav class="nav-bottom">
        <a href="/" class="{% if active_page == 'menu' %}active{% endif %}">
            <span class="icon">🍽️</span>献立
        </a>
        <a href="/shopping" class="{% if active_page == 'shopping' %}active{% endif %}">
            <span class="icon">🛒</span>買い物
        </a>
        <a href="/pantry" class="{% if active_page == 'pantry' %}active{% endif %}">
            <span class="icon">🔍</span>食材
        </a>
        <a href="/memo" class="{% if active_page == 'memo' %}active{% endif %}">
            <span class="icon">📝</span>家族メモ
        </a>
    </nav>

    {% block scripts %}{% endblock %}
</body>
</html>
